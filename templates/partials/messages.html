{% if messages %}
    <div class="message-stack mb-3">
        {% for message in messages %}
            <div class="alert mb-2 {% if message.tags == 'error' %}alert-danger{% elif message.tags == 'warning' %}alert-warning{% else %}alert-success{% endif %}" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
